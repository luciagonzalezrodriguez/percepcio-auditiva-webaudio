<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Afinació d'una Freqüència</title>
     <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&family=Rubik+Mono+One&family=Zalando+Sans+SemiExpanded:wght@700&family=Barlow:wght@700&display=swap" rel="stylesheet">
     <style>

        body {
            margin: 0;
            padding: 0 40px;
            font-family: 'Rubik', sans-serif;
            background: #eabae2; 
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: #f9f5e1; 
            z-index: -1;
        }


        h1 {
            font-family: 'Zalando Sans SemiExpanded';
            font-weight: 900;
            font-size: 3.2rem;
            margin: 150px 0px 0px 0px;
            text-transform: uppercase;
            line-height: 1.2;
        }
        h2 {
            font-family: 'Rubik';
            font-weight: 700;
            font-size: 1.5rem;
            margin: 30px 50px;
            text-transform: lowercase;
        }
        #idleSection {
            text-align: center;
            margin-top: 20px;

        }
        .voice-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            align-items:center;
            width: 100%; 
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .voice-btn {
            padding: 18px;
            font-family: 'Barlow';
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            border: 2px solid #3c2c22;
            border-radius: 10px;
            background: rgb(248, 249, 238);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 4px 4px 0 #3c2c22;
            align-items: center;
        }

        .voice-btn.selected {
            background: #ebcfe6; 
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #3c2c22;
        }

        #startBtn:active:not(:disabled) {
            --_p: 0%;
            --_i: 1;
            box-shadow: -4px 4px 2px #eabae2;
        }

        #startBtn:disabled { opacity: 0.3; cursor: not-allowed; transform: perspective(500px) rotateY(calc(20deg*var(--_i,-1))); }
        #evaluatingSection {
            display: none;        
            flex-direction: column; 
            align-items: center;   
            justify-content: flex-start;
            padding-top: 60px;
            gap: 10px;             
            width: 100%;
            margin: 0 auto;         
        }
        .page-header {
            display:grid;
            grid-template-columns: 1fr auto 1fr;
            width: 100vw;
            background: #3c2c22;
            padding: 10px 0;
            position:absolute;
            top:0;
            left:0;
        }
        
        body.evaluating-mode {
            background: #f9f5e1; 
        }

        body.evaluating-mode::after {
            display: none;
        }
        #startBtn {
            font-family: 'Rubik Mono One';
            padding: 20px 50px;
            font-size: 1.2rem;
            background: #3c2c22;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.1s;
            transform: perspective(500px) rotateY(calc(20deg*var(--_i,-1)));
        }
        #tunerLabels {
            width: 400px; 
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px; 
            font-family: 'Space Mono';
            font-weight: bold;
            color: #555;
        }
        #tunerCanvas {
            background: #fff;
            border: 3px solid #3c2c22 !important;
            width: 30%;
            height: 120px;
        }

        #tunerLabels span {
            flex: 1;
            font-size: 0.75rem;
        }
        #tunerLabels span:nth-child(1) { text-align: left; }
        #tunerLabels span:nth-child(2) { text-align: center; }
        #tunerLabels span:nth-child(3) { text-align: right; }
        
        .freq-label {
            font-family: 'Rubik';
            font-weight: 700;
            font-size: 1.5rem;
            color: #2c3e50;
            padding: 5px 10px;
            margin: 15px;
        }
        
        /* Contenidor de botons */
        #evaluatingButtons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width:400px;
            margin: 0px auto 0 auto;
        }
        
        #listenBtn {
            grid-column: span 2;
            font-family: 'Rubik Mono One';
            background: #fabef0;
            border: 3px solid #3c2c22;
            color: #3c2c22;
            padding: 20px;
            cursor: pointer;
            box-shadow: 1px 1px #3c2c22, 2px 2px #3c2c22, 3px 3px 0 #3c2c22;
            border-radius: 15px;
            text-transform: uppercase;
            width: 100%;            
        }

        #repeatBtn, #nextBtn {
            font-family: 'Barlow';
            background: rgb(252, 252, 248);
            border: 2px solid #3c2c22;

            padding: 10px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 1px 1px #3c2c22, 2px 2px #3c2c22;
            width: 100%; 
        }

        #listenBtn:hover { transform:translate(2px, 2px); box-shadow: 0 0; }
        #repeatBtn:hover, #nextBtn:hover { transform: translate(2px, 2px); box-shadow: 0 0; }
        
        .exit-btn {
            font-family: 'Space Mono';
            background: transparent;
            border: transparent;
            color: #f9f5e1;
            padding: 8px 15px;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.7rem;
            justify-self:start;
        }

        .flash-success {
            background: rgba(0, 255, 0, 0.1) !important;
            transition: background 0.3s;
        }
        .score-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #82b5fc;
            color: #000;
            font-family: 'Space Mono';
            padding: 15px 25px;
            box-shadow: 1px 1px 2px #3c2c22;
            
        }
        .tips-wrapper {
            position: relative;
            grid-column:2;
            display: inline-block;
        }

        .tips-dropdown {
            position: absolute;
            top: 150%; 
            transform: translateX(-35%);
            width: 500px;
            background-color: #f9f5e1;
            border: 1px solid #3c2c22;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
        }

        .tips-dropdown h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #3c2c22;
            font-size: 1rem;
        }

        .tips-dropdown ul {
            font-family: 'Rubik';
            margin: 0;
            padding-left: 20px;
            color: #3c2c22;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .tips-dropdown li {
            margin-bottom: 8px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div id="idleSection">
    <h1>Afina la Freqüència</h1>
    <h2>Selecciona la teva tessitura</h2>
    
    <div class="voice-selector">
        <button type="button" class="voice-btn" data-min="261.63" data-max="698.46">Soprano</button>
        <button type="button" class="voice-btn" data-min="196" data-max="523.25">Contralt</button>
        <button type="button" class="voice-btn" data-min="130.81" data-max="349.23">Tenor</button>
        <button type="button" class="voice-btn" data-min="98" data-max="261.63">Baix</button>
    </div>

    <button id="startBtn" disabled>Començar</button>
</div>
<div id="evaluatingSection" style="display: none;">
    <div class="page-header">
        <button id="backBtn" class="exit-btn">← Tornar a l'Inici</button>
        <div class="tips-wrapper">
                <button id="tipsBtn" class="exit-btn" title="Recomanacions">Recomanacions</button>
                
                <div id="tipsDropdown" class="tips-dropdown hidden">
                    <h4></h4>
                    <ul>
                        <li>Estabilitza la freqüència dins la zona verda durant 1 segon per poder donar-la per bona.</li>
                    </ul>
                </div>
        </div>
    </div>
    <div id="targetfreqDisplay" class="freq-label">
        <p>Freqüència Objectiu: <span id="targetFreqVal">0</span> Hz</p>
    </div>
    <div id="tunerLabels">
        <span>-50 cents</span>
        <span>0</span>
        <span>+50 cents</span>
    </div>
    
    <canvas id="tunerCanvas" width="400" height="100" style="border:1px solid black;"></canvas>
    <div id="detectedfreqDisplay" class="freq-label">
        <p>Detectada: <span id="detectedFreqVal">0</span> Hz</p>
    </div>
    <div id="evaluatingButtons">
        <button id="listenBtn">Cantar ara</button>
        <button id="repeatBtn">Tornar a escoltar</button>
        <button id="nextBtn">Següent freqüència</button>

    </div>

    <div id="scoreCounter" class="score-counter">
        <span id="hits">0</span> / <span id="attempts">0</span>
    </div>
</div>



<script src="ex1.js"></script>

</body>
</html>
